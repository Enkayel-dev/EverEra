<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Timeline</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D1117;
      color: #E6EDF3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ─────────────────────────────────────────────────────────── */
    .topbar {
      padding: 13px 28px;
      border-bottom: 1px solid #21262D;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0D1117;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 19px;
      font-weight: 800;
    }

    .topbar-count {
      font-size: 13px;
      color: #8B949E;
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-add {
      background: #238636;
      color: #fff;
      border: 1px solid rgba(240, 246, 252, .1);
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #2EA043;
    }

    .btn-sm {
      background: #21262D;
      color: #C9D1D9;
      border: 1px solid #30363D;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-sm:hover {
      background: #30363D;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .tl-outer {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .tscroll {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    .sticky-date {
      position: sticky;
      top: 6px;
      left: 0;
      z-index: 20;
      margin: 0 0 -42px 6px;
      width: 140px;
      height: 28px;
      background: transparent;
      border: 1px solid rgba(56, 139, 253, .3);
      border-radius: 9px;
      box-shadow: 0 0 10px 2px rgba(56, 139, 253, .06);
      pointer-events: none;
    }

    /* lens-bottom handled via inline style in JS */

    /* ── Empty ───────────────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #8B949E;
    }

    .empty-icon {
      font-size: 46px;
      margin-bottom: 14px;
    }

    .empty h3 {
      font-size: 17px;
      font-weight: 600;
      color: #E6EDF3;
      margin-bottom: 7px;
    }

    .empty p {
      font-size: 14px;
      line-height: 1.75;
    }

    /* ── Timeline Container ─────────────────────────────────────────────── */
    .tl-container {
      position: relative;
      min-height: 100%;
    }

    .tl-spacer {
      height: 45vh;
    }

    /* ── Month Rows ─────────────────────────────────────────────────────── */
    .month-row {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      pointer-events: none;
    }

    .month-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: #21262D;
    }

    .month-label {
      position: absolute;
      left: 10px;
      top: 0;
      transform: translateY(-50%);
      font-size: 9px;
      font-weight: 700;
      color: #484F58;
      letter-spacing: .05em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      transition: transform .1s ease-out, filter .1s ease-out;
      will-change: transform, filter;
      padding: 0 6px;
    }

    .month-row.jan .month-line {
      background: #30363D;
      height: 3px;
      top: -1px;
    }

    /* ── Date Rows ─────────────────────────────────────────────────────── */
    .date-row {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      pointer-events: none;
      z-index: 2;
    }

    .date-line {
      position: absolute;
      left: 152px;
      right: 0;
      top: 0;
      height: 1px;
      background: rgba(56, 139, 253, .15);
    }

    .date-label {
      position: absolute;
      left: 6px;
      top: 0;
      transform: translateY(-50%);
      pointer-events: none;
      user-select: none;
      width: 140px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D1117;
      border: 1px solid rgba(56, 139, 253, .12);
      border-radius: 9px;
    }

    .date-label-text {
      font-size: 8px;
      font-weight: 600;
      color: #388BFD;
      opacity: .6;
      letter-spacing: .03em;
      white-space: nowrap;
      transition: transform .1s ease-out, filter .1s ease-out;
      will-change: transform, filter;
    }

    /* ── Lane Lines ─────────────────────────────────────────────────────── */
    .lane-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 1;
    }

    .lane-line {
      position: absolute;
      width: 2px;
      border-radius: 1px;
      opacity: .55;
      z-index: 1;
    }

    .lane-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      z-index: 3;
      transform: translate(-50%, -50%);
      cursor: ns-resize;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .lane-dot::after {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
    }

    .lane-dot.start {
      width: 12px;
      height: 12px;
      border: 2.5px solid;
      background: transparent;
    }

    .lane-dot.end {}

    .lane-dot.end.ongoing {
      cursor: default;
    }

    .lane-dot.dragging {
      filter: brightness(1.5);
      box-shadow: 0 0 8px 2px currentColor;
      transform: translate(-50%, -50%) scale(1.4);
      z-index: 10;
    }

    .lane-dot.snap-active {
      transform: translate(-50%, -50%) scale(2);
      z-index: 5;
      box-shadow: 0 0 8px 2px currentColor;
    }

    .drag-preview-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      border-top: 2px dashed #58A6FF;
      opacity: .5;
      pointer-events: none;
      z-index: 8;
    }

    .drag-date-tooltip {
      position: absolute;
      z-index: 11;
      background: #161B22;
      border: 1px solid #388BFD;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #58A6FF;
      white-space: nowrap;
      pointer-events: none;
      transform: translateX(12px);
    }

    /* ── Event Cards ────────────────────────────────────────────────────── */
    .ev-card {
      position: absolute;
      z-index: 2;
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 7px;
      padding: 8px 11px;
      cursor: pointer;
      transition: all .2s ease;
      border-left-width: 3px;
      border-left-style: solid;
      min-width: 0;
      overflow: hidden;
    }

    .ev-card:hover {
      box-shadow: 0 0 0 3px rgba(56, 139, 253, .07);
    }

    .ev-card.end-card {
      opacity: .7;
    }

    .ev-card.end-card:hover {
      opacity: .9;
    }

    .ev-card-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .ev-card-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .ev-card-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ev-card-date {
      font-size: 10px;
      font-weight: 600;
      margin-top: 2px;
      opacity: .7;
    }

    .ev-card-type {
      font-size: 9px;
      font-weight: 700;
      opacity: .5;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .ev-card-files {
      font-size: 10px;
      color: #8B949E;
      margin-top: 3px;
    }

    .ev-card.focused {
      z-index: 5;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .35);
      border-color: rgba(56, 139, 253, .3);
      opacity: 1 !important;
    }

    .ev-card-summary {
      display: none;
      margin-top: 6px;
      font-size: 11px;
      color: #8B949E;
      line-height: 1.5;
    }

    .ev-card.focused .ev-card-summary {
      display: block;
    }

    .ev-card.expanded {
      z-index: 50 !important;
      max-height: 70vh;
      overflow-y: auto;
      cursor: default;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
      max-width: 480px;
      transform: none !important;
      width: auto !important;
      right: 16px !important;
      opacity: 1 !important;
    }

    .ev-card-detail {
      margin-top: 10px;
    }

    .ev-card-attachments {
      margin: 8px 0;
    }

    .ev-card-attachments img {
      max-width: 100%;
      border-radius: 6px;
      border: 1px solid #30363D;
      margin-top: 6px;
      display: block;
    }

    /* ── Modal ───────────────────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 999;
      align-items: flex-start;
      justify-content: center;
      backdrop-filter: blur(3px);
      padding: 32px 16px;
      overflow-y: auto;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 13px;
      padding: 26px 26px 22px;
      width: 560px;
      max-width: 100%;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .75);
      flex-shrink: 0;
      margin: auto;
    }

    .mhead {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .mhead h2 {
      font-size: 17px;
      font-weight: 700;
      flex: 1;
    }

    .btn-x {
      background: none;
      border: none;
      color: #8B949E;
      font-size: 17px;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 5px;
      line-height: 1;
      font-family: inherit;
    }

    .btn-x:hover {
      background: #21262D;
      color: #E6EDF3;
    }

    .fg {
      margin-bottom: 14px;
    }

    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #8B949E;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 5px;
    }

    .fg input,
    .fg select,
    .fg textarea {
      width: 100%;
      background: #0D1117;
      border: 1px solid #30363D;
      border-radius: 7px;
      color: #E6EDF3;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
      -webkit-appearance: none;
    }

    .fg input:focus,
    .fg select:focus,
    .fg textarea:focus {
      border-color: #388BFD;
    }

    .fg textarea {
      resize: vertical;
      min-height: 68px;
    }

    .fg input[type=date]::-webkit-calendar-picker-indicator {
      filter: invert(.6);
      cursor: pointer;
    }

    .frow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .fhint {
      font-size: 11px;
      color: #6E7681;
      margin-top: 4px;
    }

    .sec-div {
      height: 1px;
      background: #21262D;
      margin: 18px 0 16px;
    }

    .sec-lbl {
      font-size: 11px;
      font-weight: 700;
      color: #58A6FF;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 14px;
    }

    /* Files in modal */
    .files-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0D1117;
      border: 1px solid #21262D;
      border-radius: 7px;
      padding: 7px 11px;
    }

    .file-row-name {
      flex: 1;
      font-size: 13px;
      color: #C9D1D9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .file-row-size {
      font-size: 11px;
      color: #6E7681;
      flex-shrink: 0;
    }

    .file-row-tag {
      font-size: 11px;
      color: #22C55E;
      flex-shrink: 0;
      font-weight: 600;
    }

    .file-row-btns {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: #8B949E;
      font-size: 14px;
      padding: 3px 5px;
      border-radius: 4px;
      font-family: inherit;
      line-height: 1;
    }

    .btn-icon:hover {
      background: #21262D;
      color: #E6EDF3;
    }

    .btn-icon.danger:hover {
      background: rgba(218, 54, 51, .12);
      color: #DA3633;
    }

    .btn-upload-lbl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #21262D;
      border: 1px solid #30363D;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #C9D1D9;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-upload-lbl:hover {
      background: #30363D;
    }

    /* Modal footer */
    .mfoot {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #21262D;
    }

    .btn-cancel {
      background: #21262D;
      border: 1px solid #30363D;
      color: #E6EDF3;
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-cancel:hover {
      background: #30363D;
    }

    .btn-save {
      background: #238636;
      border: 1px solid rgba(240, 246, 252, .1);
      color: #fff;
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-save:hover {
      background: #2EA043;
    }

    .btn-del {
      background: none;
      border: 1px solid #DA3633;
      color: #DA3633;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      margin-right: auto;
    }

    .btn-del:hover {
      background: rgba(218, 54, 51, .1);
    }

    select option {
      background: #161B22;
      color: #E6EDF3;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #21262D;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #30363D;
    }
  </style>
</head>

<body>

  <!-- ── Topbar ───────────────────────────────────────────────────────────── -->
  <div class="topbar">
    <span class="topbar-title">Personal Timeline</span>
    <span class="topbar-count" id="tbarCount"></span>
    <div class="topbar-actions">
      <button class="btn-sm" onclick="exportData()">Export JSON</button>
      <label class="btn-sm" for="importInput" style="cursor:pointer;">Import JSON</label>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn-add" onclick="openAdd()">+ Add Event</button>
    </div>
  </div>

  <!-- ── Timeline Area ───────────────────────────────────────────────────── -->
  <div class="tl-outer">
    <div class="tscroll" id="tscroll"></div>
  </div>

  <!-- ── Modal ─────────────────────────────────────────────────────────────── -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="mhead">
        <h2 id="mTitle">Add Event</h2>
        <button class="btn-x" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="fg">
        <label>Title / Label *</label>
        <input type="text" id="fTitle" placeholder="e.g. Rented apartment on Rue St-Denis, Bought Ford F-150...">
      </div>
      <div class="fg">
        <label>Category *</label>
        <select id="fCat" onchange="onCatChange()">
          <option value="">Select a category...</option>
        </select>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Start Date *</label>
          <input type="date" id="fStart">
        </div>
        <div class="fg">
          <label>End Date</label>
          <input type="date" id="fEnd">
          <div class="fhint">Leave blank if still ongoing</div>
        </div>
      </div>
      <div id="dynamicFields"></div>
      <div class="sec-div"></div>
      <div class="sec-lbl">Documents &amp; Attachments</div>
      <div class="files-list" id="filesList"></div>
      <label class="btn-upload-lbl" for="fileInput">&#128206; Attach Files</label>
      <input type="file" id="fileInput" multiple style="display:none" onchange="onFilesSelected(event)">
      <div class="mfoot" id="mFoot"></div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════════
     * Personal Timeline — Single-file application
     *
     * Architecture: see ARCHITECTURE.md for full design reference.
     *
     * Sections in this script (in order):
     *   1. Category Schema        — field definitions per event type
     *   2. IndexedDB              — persistence layer (events + files)
     *   3. State                  — all mutable application state
     *   4. Constants & Utils      — date helpers, formatting, escaping
     *   5. Card Height Estimation — estimated card heights for layout spacing
     *   6. Layout Engine          — computes Y positions for all elements
     *   7. Render                 — builds DOM from layout, manages scroll target
     *   8. Scroll & Snap          — wheel snapping, smooth scroll, focus tracking
     *   9. Lens Magnification     — scale/brighten labels near the sticky lens
     *  10. Drag-to-Resize         — drag lane dots to change event dates
     *  11. Card Click Flow        — small → medium → full state transitions
     *  12. Inline Card Expand     — expanded card form, collapse, click-outside
     *  13. Modal & Forms          — add/edit modal, dynamic fields, category forms
     *  14. Save / Delete          — event persistence and file management
     *  15. File Handling          — attachment upload, preview, download
     *  16. Export / Import        — JSON backup and restore
     *  17. Event Listeners & Init — boot sequence and global event listeners
     * ═══════════════════════════════════════════════════════════════════════════ */


    /* ── 1. Category Schema ─────────────────────────────────────────────────── */
    // Each category defines a color, summary fields (shown on focused cards),
    // and form fields (shown in the expanded edit form / modal).
    const SCHEMA = {
      'Housing / Where I Lived': {
        color: '#4A90D9',
        summaryFields: ['address', 'city', 'rentMortgage'],
        fields: [
          { key: 'address', label: 'Street Address', type: 'text', ph: '123 Rue Principale, App. 4' },
          { key: 'city', label: 'City', type: 'text', ph: 'Montr\u00e9al' },
          { key: 'province', label: 'Province / State', type: 'text', ph: 'QC' },
          { key: 'postalCode', label: 'Postal Code', type: 'text', ph: 'H2X 1Y4' },
          { key: 'rentMortgage', label: 'Monthly Rent / Mortgage', type: 'text', ph: '$1,200/mo' },
          { key: 'landlord', label: 'Landlord / Property Co.', type: 'text', ph: '' },
          { key: 'releve31', label: 'Relev\u00e9 31 Ref # (QC)', type: 'text', ph: 'Quebec housing tax form reference number' },
          { key: 'notes', label: 'Notes', type: 'textarea', ph: '' },
        ],
      },
      'Employment': {
        color: '#22C55E',
        summaryFields: ['employer', 'jobTitle', 'salary'],
        fields: [
          { key: 'employer', label: 'Employer', type: 'text', ph: '' },
          { key: 'jobTitle', label: 'Job Title / Role', type: 'text', ph: '' },
          { key: 'salary', label: 'Salary / Wage', type: 'text', ph: '$25/hr or $55,000/yr' },
          { key: 'empType', label: 'Employment Type', type: 'select', options: ['Full-time', 'Part-time', 'Contract', 'Self-employed', 'Seasonal', 'Casual'] },
          { key: 'roeNumber', label: 'ROE Number', type: 'text', ph: 'Record of Employment number' },
          { key: 't4Box14', label: 'T4 Box 14 (Emp. Income)', type: 'text', ph: 'Total employment income on T4' },
          { key: 'notes', label: 'Notes', type: 'textarea', ph: '' },
        ],
      },
      'Education': {
        color: '#F59E0B',
        summaryFields: ['institution', 'program', 'credential'],
        fields: [
          { key: 'institution', label: 'Institution', type: 'text', ph: '' },
          { key: 'program', label: 'Program / Degree', type: 'text', ph: "DEP Electrician, DEC, Bachelor's..." },
          { key: 'studentId', label: 'Student ID', type: 'text', ph: '' },
          { key: 'credential', label: 'Credential Earned', type: 'text', ph: 'Diploma, Certificate, Degree...' },
          { key: 'notes', label: 'Notes', type: 'textarea', ph: '' },
        ],
      },
      'Vehicles': {
        color: '#A855F7',
        summaryFields: ['makeModel', 'purchasePrice', 'loanPayoffDate'],
        fields: [
          { key: 'makeModel', label: 'Make & Model', type: 'text', ph: 'Ford F-150 XLT' },
          { key: 'vehicleYear', label: 'Vehicle Year', type: 'text', ph: '2020' },
          { key: 'vin', label: 'VIN', type: 'text', ph: '' },
          { key: 'licensePlate', label: 'License Plate', type: 'text', ph: '' },
          { key: 'purchasePrice', label: 'Purchase Price', type: 'text', ph: '$42,000' },
